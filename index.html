<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sentinel-X">
<meta name="theme-color" content="#000a14">
<title>Sentinel-X</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--cyan:#00f5ff;--blue:#0066ff;--dark:#000a14}
  html,body{width:100%;height:100%;background:var(--dark);overflow:hidden;font-family:'Tajawal',sans-serif}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.04)1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.04)1px,transparent 1px);background-size:40px 40px;animation:gridPulse 4s ease-in-out infinite;pointer-events:none}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(0,102,255,.15)0%,transparent 70%);animation:glowPulse 2s ease-in-out infinite alternate;pointer-events:none}
  @keyframes gridPulse{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes glowPulse{0%{opacity:.5}100%{opacity:1}}
  #splash{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .9s ease,transform .9s ease}
  #splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}
  .corner{position:absolute;width:22px;height:22px;border-color:rgba(0,245,255,.4);border-style:solid}
  .corner-tl{top:22px;left:22px;border-width:2px 0 0 2px}
  .corner-tr{top:22px;right:22px;border-width:2px 2px 0 0}
  .corner-bl{bottom:22px;left:22px;border-width:0 0 2px 2px}
  .corner-br{bottom:22px;right:22px;border-width:0 2px 2px 0}
  .radar-ring{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;z-index:1}
  .ring{position:absolute;border-radius:50%;border:1px solid;animation:ringPulse 2s ease-in-out infinite}
  .ring:nth-child(1){width:210px;height:210px;border-color:rgba(0,245,255,.12);animation-delay:0s}
  .ring:nth-child(2){width:160px;height:160px;border-color:rgba(0,245,255,.22);animation-delay:.3s}
  .ring:nth-child(3){width:110px;height:110px;border-color:rgba(0,245,255,.38);animation-delay:.6s}
  @keyframes ringPulse{0%,100%{transform:scale(.95);opacity:.5}50%{transform:scale(1);opacity:1}}
  .sweep{position:absolute;width:210px;height:210px;border-radius:50%;animation:rotateSweep 3s linear infinite;background:conic-gradient(from 0deg,rgba(0,245,255,0)0deg,rgba(0,245,255,.6)60deg,rgba(0,245,255,0)90deg)}
  @keyframes rotateSweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .shield-icon{position:relative;z-index:2;width:68px;height:68px}
  .shield-icon svg{width:100%;height:100%;filter:drop-shadow(0 0 14px #00f5ffaa) drop-shadow(0 0 40px #00f5ff44)}
  .logo-block{text-align:center;z-index:1}
  .logo-name{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px #00f5ff88,0 0 60px #00f5ff33;letter-spacing:8px;animation:textFlicker 3s ease-in-out infinite}
  @keyframes textFlicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.6}94%{opacity:1}96%{opacity:.8}97%{opacity:1}}
  .logo-sub{font-size:13px;font-weight:300;color:rgba(0,245,255,.55);letter-spacing:3px;margin-top:6px}
  .version-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 14px;margin-top:10px;border:1px solid rgba(0,245,255,.25);border-radius:20px;font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,245,255,.45)}
  .dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:blink 1.5s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  .progress-wrap{width:260px;z-index:1;display:flex;flex-direction:column;gap:8px}
  .progress-label{display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,245,255,.5);letter-spacing:1px}
  .progress-bar{width:100%;height:2px;background:rgba(0,245,255,.1);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 10px var(--cyan);border-radius:2px;width:0%;transition:width .08s linear}
  .status-lines{z-index:1;display:flex;flex-direction:column;gap:5px;width:260px}
  .status-line{display:flex;align-items:center;gap:10px;font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,245,255,0);transition:color .3s ease}
  .status-line.show{color:rgba(0,245,255,.42)}
  .status-line::before{content:'▸';color:var(--cyan);opacity:0;transition:opacity .3s ease}
  .status-line.show::before{opacity:1}
  #redirect-notice{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,245,255,.3);letter-spacing:2px;z-index:11;opacity:0;transition:opacity .5s ease}
  #redirect-notice.show{opacity:1}
</style>
</head>
<body>
<div id="splash">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="radar-ring">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="sweep"></div>
    <div class="shield-icon">
      <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5 L90 22 L90 55 C90 80 70 105 50 115 C30 105 10 80 10 55 L10 22 Z" fill="rgba(0,245,255,0.07)" stroke="rgba(0,245,255,0.8)" stroke-width="2.5"/>
        <path d="M50 20 L78 33 L78 57 C78 75 65 93 50 101 C35 93 22 75 22 57 L22 33 Z" fill="rgba(0,102,255,0.1)" stroke="rgba(0,245,255,0.35)" stroke-width="1.5"/>
        <path d="M35 58 L45 68 L68 45" stroke="#00f5ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  <div class="logo-block">
    <div class="logo-name">SENTINEL</div>
    <div class="logo-sub">النظام الاستباقي لحماية الأرواح</div>
    <div class="version-badge"><span class="dot"></span>v2.4.1 · ESP32-S3</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="status-text">تهيئة النظام...</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
  </div>
  <div class="status-lines">
    <div class="status-line" id="s0">LOADING CORE MODULES</div>
    <div class="status-line" id="s1">CONNECTING ESP32-S3</div>
    <div class="status-line" id="s2">INITIALIZING mmWave RADAR</div>
    <div class="status-line" id="s3">AI NOSE CALIBRATION</div>
    <div class="status-line" id="s4">SYSTEM READY · النظام آمن ✓</div>
  </div>
</div>
<div id="redirect-notice">LAUNCHING SENTINEL-X...</div>
<script>
  const TARGET='https://alalawi1980.github.io/sentinel/';
  const DURATION=5000;
  const fill=document.getElementById('fill');
  const pct=document.getElementById('pct');
  const stText=document.getElementById('status-text');
  const splash=document.getElementById('splash');
  const notice=document.getElementById('redirect-notice');
  const labels=['تهيئة النظام...','اتصال ESP32-S3...','تشغيل رادار mmWave...','معايرة الأنف الرقمي...','النظام جاهز ✓'];
  [0,1,2,3,4].forEach(i=>setTimeout(()=>document.getElementById('s'+i).classList.add('show'),i*950));
  function easeInOut(t){return t<.5?2*t*t:-1+(4-2*t)*t}
  const START=performance.now();
  function tick(now){
    const raw=Math.min((now-START)/DURATION,1);
    const p=Math.round(easeInOut(raw)*100);
    fill.style.width=p+'%';
    pct.textContent=p+'%';
    stText.textContent=labels[Math.min(Math.floor(raw*labels.length),labels.length-1)];
    if(raw<1){requestAnimationFrame(tick)}
    else{
      notice.classList.add('show');
      setTimeout(()=>{
        splash.classList.add('hide');
        setTimeout(()=>{window.location.href=TARGET},900);
      },400);
    }
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
